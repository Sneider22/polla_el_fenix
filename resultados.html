<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados - Polla El Fenix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'fenix-red': '#dc2626',
                        'fenix-orange': '#ea580c',
                        'fenix-yellow': '#fbbf24',
                        'fenix-green': '#16a34a',
                        'fenix-blue': '#2563eb',
                        'fenix-purple': '#9333ea',
                        'fenix-pink': '#db2777',
                        'fenix-gray': '#6b7280'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-red-600 via-orange-500 to-red-700 min-h-screen">
    <div class="container mx-auto p-4">
        <div class="text-center mb-6">
            <h1 class="results-title text-4xl font-bold text-white mb-2 drop-shadow-lg">RESULTADOS POLLA EL FÉNIX</h1>
            <p class="results-subtitle text-white/90">Clasificación ordenada por número de aciertos</p>
        </div>

        <div class="flex justify-center mb-6 bg-white/20 rounded-full p-1 max-w-sm mx-auto">
            <button class="tab-btn flex-1 py-2 px-4 rounded-full font-bold text-white transition-all" data-game="polla">Polla (6 Números)</button>
            <button class="tab-btn flex-1 py-2 px-4 rounded-full font-bold text-white transition-all" data-game="micro">Micro (3 Números)</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Columna Izquierda: Números Ganadores y Estadísticas -->
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-white rounded-lg shadow-lg p-6">
                    <h2 class="text-xl font-bold text-gray-800 text-center mb-4">NÚMEROS GANADORES</h2>
                    <div class="flex justify-center gap-3 flex-wrap" id="winningNumbersGrid">
                        <!-- Los números ganadores se cargarán aquí -->
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow-lg p-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="text-center bg-gray-100 p-3 rounded-lg">
                            <div class="text-3xl font-bold text-fenix-blue" id="totalPlayersResult">0</div>
                            <div class="text-sm font-semibold text-gray-600">Total Jugadores</div>
                        </div>
                        <div class="text-center bg-gray-100 p-3 rounded-lg">
                            <div class="text-3xl font-bold text-fenix-green" id="totalWinnersResult">0</div>
                            <div class="text-sm font-semibold text-gray-600" id="winnerLabel">Ganadores</div>
                        </div>
                        <div class="text-center bg-gray-100 p-3 rounded-lg">
                            <div class="text-3xl font-bold text-fenix-orange" id="totalPrizeResult">0</div>
                            <div class="text-sm font-semibold text-gray-600">Premio Total</div>
                        </div>
                        <div class="text-center bg-gray-100 p-3 rounded-lg">
                            <div class="text-3xl font-bold text-fenix-purple" id="prizePerWinnerResult">0</div>
                            <div class="text-sm font-semibold text-gray-600">Premio por Ganador</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Tabla de Resultados -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                    <!-- Search Bar -->
                    <div class="p-4 border-b">
                        <input type="text" id="searchInput" placeholder="Buscar por nombre de jugador..." class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left text-gray-500">
                            <thead class="text-xs text-white uppercase bg-green-600">
                                <tr>
                                    <th scope="col" class="px-6 py-3 text-center">#</th>
                                    <th scope="col" class="px-6 py-3">NOMBRE</th>
                                    <th scope="col" class="px-6 py-3 text-center">NÚMEROS JUGADOS</th>
                                    <th scope="col" class="px-6 py-3 text-center">ACIERTOS</th>
                                    <th scope="col" class="px-6 py-3 text-center">PREMIO</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTableBody">
                                <!-- Los resultados se cargarán aquí -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center my-8 flex justify-center gap-4">
            <a href="index.html" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">← VOLVER AL JUEGO</a>
            <button onclick="exportResults()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">EXPORTAR RESULTADOS</button>
            <button onclick="printResults()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg transition-colors">IMPRIMIR</button>
        </div>
    </div>

    <!-- Librería de Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <!-- Configuración de la aplicación -->
    <script src="config.js"></script>
    <!-- Configuración de Supabase -->
    <script src="supabase-config.js"></script>
    <script src="resultados.js"></script>
</body>
</html>
